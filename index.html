<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stacja Pogodowa ESP32-S3</title>
  <!-- Emoji favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌡️</text></svg>" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0f1117;
      --surface:    #1a1d27;
      --surface-hi: #22263a;
      --border:     #2a2d3a;
      --text:       #e2e8f0;
      --muted:      #8892a4;
      --amber:      #f59e0b;
      --blue:       #4f8ef7;
      --teal:       #2dd4bf;
      --red:        #ef4444;
      --green:      #22c55e;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      padding: 16px;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
      min-width: 220px;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .status-dot.ok   { background: var(--teal);  animation: none; }
    .status-dot.err  { background: var(--red);   animation: none; }
    .status-dot.load {
      background: var(--amber);
      animation: pulse 1.2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    .status-text {
      font-size: 0.8rem;
      color: var(--muted);
    }

    header h1 {
      font-size: 1.2rem;
      font-weight: 600;
      letter-spacing: 0.01em;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    /* Countdown */
    .countdown {
      font-size: 0.78rem;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      min-width: 140px;
      text-align: right;
    }

    /* CSV button */
    .btn-csv {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 5px 13px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.8rem;
      font-family: inherit;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-csv:hover:not(:disabled) {
      border-color: var(--teal);
      color: var(--teal);
    }
    .btn-csv:disabled {
      opacity: 0.35;
      cursor: default;
    }

    /* ── Range bar ── */
    .range-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .range-bar button {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 6px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      font-family: inherit;
      transition: border-color 0.15s, color 0.15s;
    }
    .range-bar button:hover { border-color: var(--blue); color: var(--text); }
    .range-bar button.active { border-color: var(--blue); color: var(--blue); }

    /* ── Cards ── */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      transition: border-color 0.15s, transform 0.15s;
      position: relative;
      overflow: hidden;
    }

    /* Only clickable cards get pointer + hover lift */
    .card[data-target] {
      cursor: pointer;
    }
    .card[data-target]:hover {
      border-color: var(--blue);
      transform: translateY(-2px);
    }

    .card-label {
      font-size: 0.75rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }

    .card-value {
      font-size: 2rem;
      font-weight: 700;
      line-height: 1;
      position: relative;  /* needed for skeleton ::after */
    }
    .card-value.amber { color: var(--amber); }
    .card-value.blue  { color: var(--blue); }
    .card-value.teal  { color: var(--teal); }
    .card-value.muted { color: var(--text); font-size: 1.1rem; line-height: 1.3; }

    /* Trend row */
    .card-trend {
      font-size: 0.78rem;
      margin-top: 5px;
      min-height: 1.2em;
    }
    .trend-up   { color: var(--green); }
    .trend-down { color: var(--red); }
    .trend-flat { color: var(--muted); }

    .card-sub {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 4px;
      position: relative;  /* needed for skeleton ::after */
    }

    /* ── Skeleton shimmer ── */
    @keyframes shimmer {
      0%   { background-position: -400px 0; }
      100% { background-position:  400px 0; }
    }

    /* When card is loading, overlay value & sub with shimmer */
    .card.is-loading .card-value {
      color: transparent !important;
    }
    .card.is-loading .card-value::after,
    .card.is-loading .card-sub::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 4px;
      background: linear-gradient(
        90deg,
        var(--border)     25%,
        var(--surface-hi) 50%,
        var(--border)     75%
      );
      background-size: 400px 100%;
      animation: shimmer 1.5s infinite;
    }
    .card.is-loading .card-sub {
      color: transparent !important;
    }
    .card.is-loading .card-trend {
      visibility: hidden;
    }

    /* Charts fade during loading */
    .chart-card.is-loading canvas {
      opacity: 0.25;
      transition: opacity 0.3s;
    }

    /* ── Charts ── */
    .charts {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .chart-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
    }

    .chart-title {
      font-size: 0.8rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 10px;
    }

    .chart-card canvas {
      height: 180px !important;
      transition: opacity 0.3s;
    }

    @media (min-width: 640px) {
      .chart-card canvas { height: 200px !important; }
    }

    /* ── Empty / Error ── */
    #empty {
      display: none;
      text-align: center;
      color: var(--muted);
      padding: 48px 20px;
      font-size: 0.9rem;
    }

    .btn-retry {
      margin-top: 14px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 7px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      font-family: inherit;
      display: inline-block;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-retry:hover { border-color: var(--teal); color: var(--teal); }
  </style>
</head>
<body>

  <header>
    <div class="header-left">
      <div class="status-dot load" id="statusDot"></div>
      <span class="status-text" id="statusText">Ładowanie…</span>
      <h1>Stacja Pogodowa ESP32-S3</h1>
    </div>
    <div class="header-right">
      <span class="countdown" id="countdown"></span>
      <button class="btn-csv" id="btnCsv" disabled title="Pobierz dane jako CSV">↓ CSV</button>
    </div>
  </header>

  <div class="range-bar">
    <button data-h="24"  class="active">24h</button>
    <button data-h="48">48h</button>
    <button data-h="168">7 dni</button>
    <button data-h="720">30 dni</button>
  </div>

  <div class="cards">
    <!-- data-target → ID kanwasa wykresu, do którego scrollujemy -->
    <div class="card is-loading" data-target="chartTemp">
      <div class="card-label">Temperatura</div>
      <div class="card-value amber" id="cardTemp">—</div>
      <div class="card-trend" id="trendTemp"></div>
      <div class="card-sub"   id="cardTempSub">min — · max —</div>
    </div>
    <div class="card is-loading" data-target="chartHum">
      <div class="card-label">Wilgotność</div>
      <div class="card-value blue" id="cardHum">—</div>
      <div class="card-trend" id="trendHum"></div>
      <div class="card-sub"   id="cardHumSub">min — · max —</div>
    </div>
    <div class="card is-loading" data-target="chartPres">
      <div class="card-label">Ciśnienie</div>
      <div class="card-value teal" id="cardPres">—</div>
      <div class="card-trend" id="trendPres"></div>
      <div class="card-sub"   id="cardPresSub">min — · max —</div>
    </div>
    <div class="card is-loading">
      <div class="card-label">Ostatni sync</div>
      <div class="card-value muted" id="cardSync">—</div>
      <div class="card-sub"  id="cardCount">— odczytów</div>
    </div>
  </div>

  <div id="empty">
    <p>Brak danych dla wybranego zakresu czasu.</p>
    <button class="btn-retry" id="btnRetry">↺ Spróbuj ponownie</button>
  </div>

  <div class="charts">
    <div class="chart-card is-loading">
      <div class="chart-title">Temperatura (°C)</div>
      <canvas id="chartTemp"></canvas>
    </div>
    <div class="chart-card is-loading">
      <div class="chart-title">Wilgotność (%)</div>
      <canvas id="chartHum"></canvas>
    </div>
    <div class="chart-card is-loading">
      <div class="chart-title">Ciśnienie (hPa)</div>
      <canvas id="chartPres"></canvas>
    </div>
  </div>

  <script>
    /* ═══════════════════════════════════════════════
       CONFIG
    ═══════════════════════════════════════════════ */
    const SUPABASE_URL      = 'https://izudnxavhfuuxdnyckdh.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_DyhhWHN83GulCQ70SyQVww_zTSqLJ3l';
    const TABLE             = 'readings';
    const REFRESH_MS        = 5 * 60 * 1000;

    /* ═══════════════════════════════════════════════
       HELPERS
    ═══════════════════════════════════════════════ */
    function setStatus(state) {
      document.getElementById('statusDot').className = 'status-dot ' + state;
      document.getElementById('statusText').textContent =
        state === 'load' ? 'Ładowanie…'       :
        state === 'ok'   ? 'Połączono'        :
                           'Błąd połączenia';
    }

    function formatTime(iso, hours) {
      const d = new Date(iso);
      if (hours <= 48)
        return d.toLocaleTimeString('pl-PL', { hour: '2-digit', minute: '2-digit' });
      return d.toLocaleDateString('pl-PL', { day: '2-digit', month: '2-digit' })
           + ' ' + d.toLocaleTimeString('pl-PL', { hour: '2-digit', minute: '2-digit' });
    }

    function minmax(arr) {
      return { min: Math.min(...arr), max: Math.max(...arr) };
    }

    // Returns HTML string for the trend indicator
    function trendHtml(first, last, unit) {
      const diff = parseFloat((last - first).toFixed(1));
      const abs  = Math.abs(diff).toFixed(1);
      if (diff > 0.05)  return `<span class="trend-up">↑ +${abs} ${unit}</span>`;
      if (diff < -0.05) return `<span class="trend-down">↓ −${abs} ${unit}</span>`;
      return `<span class="trend-flat">→ bez zmian</span>`;
    }

    /* ═══════════════════════════════════════════════
       CHARTS — gradient fill + styled tooltip
    ═══════════════════════════════════════════════ */
    function gradientFn(hexColor) {
      return function(context) {
        const { ctx, chartArea } = context.chart;
        if (!chartArea) return hexColor + '20';
        const g = ctx.createLinearGradient(0, chartArea.top, 0, chartArea.bottom);
        g.addColorStop(0, hexColor + '65');
        g.addColorStop(1, hexColor + '00');
        return g;
      };
    }

    function makeChart(canvasId, hexColor, unit) {
      const ctx = document.getElementById(canvasId).getContext('2d');
      return new Chart(ctx, {
        type: 'line',
        data: {
          labels: [],
          datasets: [{
            data: [],
            borderColor: hexColor,
            backgroundColor: gradientFn(hexColor),
            borderWidth: 2,
            pointRadius: 0,
            pointHoverRadius: 4,
            fill: true,
            tension: 0.3,
          }],
        },
        options: {
          animation: false,
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: '#1a1d27',
              borderColor:     '#2a2d3a',
              borderWidth:     1,
              titleColor:      '#8892a4',
              bodyColor:       '#e2e8f0',
              padding:         10,
              displayColors:   false,
              callbacks: {
                label: (ctx) => ` ${ctx.parsed.y} ${unit}`,
              },
            },
          },
          scales: {
            x: {
              ticks: { maxTicksLimit: 8, color: '#8892a4', font: { size: 11 } },
              grid:  { color: '#2a2d3a' },
            },
            y: {
              ticks: { maxTicksLimit: 5, color: '#8892a4', font: { size: 11 } },
              grid:  { color: '#2a2d3a' },
            },
          },
        },
      });
    }

    const charts = {
      temp: makeChart('chartTemp', '#f59e0b', '°C'),
      hum:  makeChart('chartHum',  '#4f8ef7', '%'),
      pres: makeChart('chartPres', '#2dd4bf', 'hPa'),
    };

    /* ═══════════════════════════════════════════════
       SKELETON — loading state
    ═══════════════════════════════════════════════ */
    function setLoading(on) {
      document.querySelectorAll('.card, .chart-card')
        .forEach(el => el.classList.toggle('is-loading', on));
    }

    /* ═══════════════════════════════════════════════
       COUNTDOWN
    ═══════════════════════════════════════════════ */
    let nextRefreshAt = null;
    let countdownId   = null;

    function updateCountdown() {
      const el = document.getElementById('countdown');
      if (!nextRefreshAt) { el.textContent = ''; return; }
      const rem = Math.max(0, Math.ceil((nextRefreshAt - Date.now()) / 1000));
      const m   = Math.floor(rem / 60).toString().padStart(2, '0');
      const s   = (rem % 60).toString().padStart(2, '0');
      el.textContent = `Odświeżenie za ${m}:${s}`;
    }

    /* ═══════════════════════════════════════════════
       RENDER
    ═══════════════════════════════════════════════ */
    let currentRows = [];

    function renderData(rows, hours) {
      currentRows = rows;

      const labels = rows.map(r => formatTime(r.recorded_at, hours));
      const temps  = rows.map(r => r.temp_c);
      const hums   = rows.map(r => r.humidity_pct);
      const press  = rows.map(r => r.pressure_hpa);

      // Update charts
      [['temp', temps], ['hum', hums], ['pres', press]].forEach(([key, data]) => {
        charts[key].data.labels             = labels;
        charts[key].data.datasets[0].data   = data;
        charts[key].update();
      });

      const first = rows[0];
      const last  = rows[rows.length - 1];

      // Current values
      document.getElementById('cardTemp').textContent  = `${last.temp_c} °C`;
      document.getElementById('cardHum').textContent   = `${last.humidity_pct} %`;
      document.getElementById('cardPres').textContent  = `${last.pressure_hpa} hPa`;

      const syncTime = new Date(last.recorded_at).toLocaleTimeString('pl-PL', {
        hour: '2-digit', minute: '2-digit', second: '2-digit',
      });
      document.getElementById('cardSync').textContent  = syncTime;
      document.getElementById('cardCount').textContent = `${rows.length} odczytów`;

      // Trend arrows
      document.getElementById('trendTemp').innerHTML = trendHtml(first.temp_c,       last.temp_c,       '°C');
      document.getElementById('trendHum').innerHTML  = trendHtml(first.humidity_pct, last.humidity_pct, '%');
      document.getElementById('trendPres').innerHTML = trendHtml(first.pressure_hpa, last.pressure_hpa, 'hPa');

      // Min/max subtitles
      const mm = { t: minmax(temps), h: minmax(hums), p: minmax(press) };
      document.getElementById('cardTempSub').textContent  = `min ${mm.t.min} · max ${mm.t.max} °C`;
      document.getElementById('cardHumSub').textContent   = `min ${mm.h.min} · max ${mm.h.max} %`;
      document.getElementById('cardPresSub').textContent  = `min ${mm.p.min} · max ${mm.p.max} hPa`;

      // Dynamic tab title
      document.title = `${last.temp_c}°C · ${last.humidity_pct}% | Stacja Pogodowa`;

      // Enable CSV
      document.getElementById('btnCsv').disabled = false;

      document.getElementById('empty').style.display = 'none';
    }

    /* ═══════════════════════════════════════════════
       FETCH
    ═══════════════════════════════════════════════ */
    async function loadData(hours) {
      setStatus('load');
      setLoading(true);

      const since = new Date(Date.now() - hours * 3600 * 1000).toISOString();
      const url   = `${SUPABASE_URL}/rest/v1/${TABLE}`
                  + `?recorded_at=gte.${since}`
                  + `&order=recorded_at.asc`
                  + `&select=recorded_at,temp_c,pressure_hpa,humidity_pct`;

      try {
        const res = await fetch(url, {
          headers: {
            apikey:        SUPABASE_ANON_KEY,
            Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
          },
        });
        if (!res.ok) throw new Error(res.status);
        const rows = await res.json();

        setLoading(false);

        if (!rows.length) {
          setStatus('err');
          document.getElementById('empty').style.display = 'block';
          return;
        }

        renderData(rows, hours);
        setStatus('ok');
      } catch (e) {
        setLoading(false);
        setStatus('err');
        document.getElementById('empty').style.display = 'block';
        console.error('Fetch error:', e);
      }
    }

    /* ═══════════════════════════════════════════════
       INTERVAL + RANGE BUTTONS
    ═══════════════════════════════════════════════ */
    let activeHours = 24;
    let timerId     = null;

    function startInterval() {
      clearInterval(timerId);
      clearInterval(countdownId);
      nextRefreshAt = Date.now() + REFRESH_MS;
      timerId     = setInterval(() => {
        loadData(activeHours);
        nextRefreshAt = Date.now() + REFRESH_MS;
      }, REFRESH_MS);
      countdownId = setInterval(updateCountdown, 1000);
      updateCountdown();
    }

    document.querySelectorAll('.range-bar button').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.range-bar button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeHours = parseInt(btn.dataset.h);
        loadData(activeHours);
        startInterval();
      });
    });

    /* ═══════════════════════════════════════════════
       CLICK CARD → SCROLL TO CHART
    ═══════════════════════════════════════════════ */
    document.querySelectorAll('.card[data-target]').forEach(card => {
      card.addEventListener('click', () => {
        const canvas = document.getElementById(card.dataset.target);
        if (canvas) {
          canvas.closest('.chart-card').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
      });
    });

    /* ═══════════════════════════════════════════════
       CSV EXPORT
    ═══════════════════════════════════════════════ */
    document.getElementById('btnCsv').addEventListener('click', () => {
      if (!currentRows.length) return;
      const header = 'Czas,Temperatura (°C),Wilgotność (%),Ciśnienie (hPa)';
      const lines  = currentRows.map(r =>
        `${r.recorded_at},${r.temp_c},${r.humidity_pct},${r.pressure_hpa}`
      );
      const blob = new Blob([header + '\n' + lines.join('\n')], { type: 'text/csv;charset=utf-8;' });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href     = url;
      a.download = `stacja_${new Date().toISOString().slice(0, 10)}_${activeHours}h.csv`;
      a.click();
      URL.revokeObjectURL(url);
    });

    /* ═══════════════════════════════════════════════
       RETRY BUTTON
    ═══════════════════════════════════════════════ */
    document.getElementById('btnRetry').addEventListener('click', () => {
      document.getElementById('empty').style.display = 'none';
      loadData(activeHours);
    });

    /* ═══════════════════════════════════════════════
       INIT
    ═══════════════════════════════════════════════ */
    loadData(activeHours);
    startInterval();
  </script>
</body>
</html>
